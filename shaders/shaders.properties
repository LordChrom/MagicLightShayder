#define SHADERS_PROPERTIES
#///// the following to be copied from settings.glsl
#define AREA_SIZE (AREA_WIDTH_SECTIONS*SECTION_SIZE)

#if AREA_SIZE == 32
#define AREA_SIZE_MEM 34
#elif AREA_SIZE == 64
#define AREA_SIZE_MEM 66
#else
#endif

#define MEM_SIZE_BIG_EXACT (AREA_SIZE_MEM*6*VOX_LAYERS*NUM_CASCADES)

#if MEM_SIZE_BIG_EXACT  <=256
#define MEM_SIZE_BIG  256
#elif MEM_SIZE_BIG_EXACT<=512
#define MEM_SIZE_BIG  512
#elif MEM_SIZE_BIG_EXACT<=1024
#define MEM_SIZE_BIG  1024
#elif MEM_SIZE_BIG_EXACT<=2048
#define MEM_SIZE_BIG  2048
#elif MEM_SIZE_BIG_EXACT<=4096
#define MEM_SIZE_BIG  4096
#else
#define MEM_SIZE_BIG 8192
#endif

#ifdef BLOOM_SMART
#if LIGHTING_RENDERSCALE<1
#if BLOOM_LEVEL==1
#define BLOOM_LEVEL 2
#elif BLOOM_LEVEL==0
#define BLOOM_LEVEL 1
#endif
#endif
#endif
#/////

iris.features.required = CUSTOM_IMAGES BLOCK_EMISSION_ATTRIBUTE COMPUTE_SHADERS SSBO
iris.features.optional = ENTITY_TRANSLUCENT
oldLighting=true

shadow.enabled=true
shadowTranslucent=true

shadowEntities=false
shadowPlayer=false
shadowBlockEntities=false

skipAllRendering=false
voxelizeLightBlocks=true

#define VOX_SIZE_BIG 1000

occlusion.culling=true
image.worldVox = worldVoxSampler rgba_integer R32UI unsigned_byte true false AREA_SIZE_MEM AREA_SIZE_MEM AREA_SIZE_MEM
image.lightVox = lightVoxSampler rgba_integer RGBA32UI unsigned_int false false AREA_SIZE_MEM AREA_SIZE_MEM MEM_SIZE_BIG
bufferObject.0=1024
bufferObject.1=12

indirect.prepare10 = 1 0

#yea doesnt really do anthing
allowConcurrentCompute = false

shadow.culling = reversed

screen.DebugStyle = UNFLIP_DEBUG_MAPS DEBUG_OUTLINE_WIDTH DEBUG_DECOLOR
screen.Misc = PRIDE_LIGHTING gap PARALLEL_UNPACK SHORTLISTED_COMPARISON AXES_INORDER
screen.Debug = DEBUG_OCCLUSION_MAP [DebugStyle] DEBUG_GRID_OUTLINE DEBUG_AXIS \
  EVERYTHING_IS_THE_SUN EVERYTHING_FACING_SRC KEEP_FULLY_OCCLUDED_SAMPLES DEBUG_SHOW_UPDATES DEBUG_UPDATES_INTENSITY \
  UNOCCLUDED_INTO_BLOCKS DEBUG_SCALE LIGHT_SOURCES_BLOCK_CENTERIC DEBUG_WHITEN DEBUG_WHITE_LEVEL DEBUG_SPECIAL_VIEW
screen.LightSystem = VOX_LAYERS COLORED_TRANSLUCENTS PENUMBRA_WIDTH PENUMBRAS_ENABLED UPDATE_STRIDE

screen.Fog = VOLUMETRIC_FOG_SAMPLES FOG_DITHER_METHOD FOG_DENSITY FOG_BRIGHTNESS MAX_FOG_DEPTH FOG_TEMPORAL_NOISE FOG_BLUR

screen.Bloom = BLOOM_INTENSITY BLOOM_WIDTH BLOOM_LEVEL BLOOM_SMART

screen = [LightSystem] [Fog] [Debug] [Misc] [Bloom] LIGHTING_RENDERSCALE VANILLA_FALLBACK TRANSLUCENT_SEPARATE_BUFFER NUM_CASCADES MIN_SCALE

sliders = LIGHTING_RENDERSCALE BLOOM_WIDTH \
DEBUG_OUTLINE_WIDTH DEBUG_GRID_OUTLINE DEBUG_AXIS DEBUG_UPDATES_INTENSITY DEBUG_SCALE DEBUG_WHITE_LEVEL DEBUG_SPECIAL_VIEW \
VOX_LAYERS PENUMBRA_WIDTH UPDATE_STRIDE \
VOLUMETRIC_FOG_SAMPLES FOG_DENSITY FOG_BRIGHTNESS MAX_FOG_DEPTH FOG_BLUR \
BLOOM_INTENSITY BLOOM_LEVEL NUM_CASCADES MIN_SCALE

#blend.gbuffers_entities.colortex2 = off
blend.gbuffers_basic.colortex2 = off
blend.gbuffers_hand.colortex2 = off
blend.gbuffers_hand_water.colortex2 = off
blend.gbuffers_block.colortex2 = off

blend.composite3.colortex6 = off
blend.composite4.colortex6 = off

#blend.gbuffers_block.colortex0 = off
separateEntityDraws=false

#if LIGHTING_RENDERSCALE < 1
size.buffer.colortex6 = LIGHTING_RENDERSCALE LIGHTING_RENDERSCALE
size.buffer.colortex7 = LIGHTING_RENDERSCALE LIGHTING_RENDERSCALE
size.buffer.colortex15 = LIGHTING_RENDERSCALE LIGHTING_RENDERSCALE
#endif


#if (FOG_BLUR<2) && (BLOOM_LEVEL<2)
program.composite6.enabled=false
#endif

#TODO make it able to move in increments less than 1 block
uniform.vec3.globalOrigin = floor(cameraPosition)
uniform.vec3.previousGlobalOrigin = floor(previousCameraPosition)
